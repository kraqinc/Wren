<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Wren — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <div class="wordmark">
      <span class="mark-icon">◆</span>
      <span class="mark-text">Wren</span>
    </div>

    <div class="illustration" aria-hidden="true">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Bloques que se levantan y se acomodan -- animación propia de
             Wren, distinta a cualquier ilustración de otra marca. -->
        <rect class="block block-a" x="40" y="120" width="42" height="42" rx="8"/>
        <rect class="block block-b" x="90" y="90" width="42" height="72" rx="8"/>
        <rect class="block block-c" x="140" y="60" width="20" height="102" rx="8"/>
        <circle class="accent-dot" cx="150" cy="42" r="7"/>
        <path class="accent-line" d="M150 50 L150 60" />
      </svg>
    </div>

    <h1 class="headline" data-i18n="headline">Crea. Construye.<br><em>Lanza.</em></h1>

    <section class="card">
      <form id="emailStep" class="form">
        <label class="visually-hidden" for="email" data-i18n="emailLabel">Correo</label>
        <input id="email" type="email" autocomplete="email" placeholder="Ingresa tu correo electrónico" required />

        <button id="requestCodeBtn" class="primary" type="submit" data-i18n="continue">Continuar</button>

        <p id="error" class="error" hidden></p>

        <div class="divider"><span data-i18n="or">o</span></div>

        <button type="button" class="oauth google" data-provider="Google">
          <svg viewBox="0 0 48 48" width="18" height="18"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-2.1 14.1-5.5l-6.5-5.5c-2 1.4-4.6 2.3-7.6 2.3-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.5 5.5C39.9 37 44 31 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
          <span data-i18n="continueGoogle">Continuar con Google</span>
        </button>

        <button type="button" class="oauth github" data-provider="GitHub">
          <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          <span data-i18n="continueGithub">Continuar con GitHub</span>
        </button>

        <p class="terms" data-i18n="terms">
          Al continuar aceptas los Términos del Consumidor, la Política de Uso y la Política de Privacidad de Wren.
        </p>
      </form>

      <form id="codeStep" class="form" hidden>
        <p class="copy" id="codeStepCopy" style="margin: 0 0 16px;"></p>
        <label class="visually-hidden" for="code" data-i18n="codeLabel">Código de 6 dígitos</label>
        <input id="code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="123456" autocomplete="one-time-code" required />

        <button id="verifyCodeBtn" class="primary" type="submit" data-i18n="verify">Verificar</button>
        <button id="backToEmailBtn" class="secondary" type="button" data-i18n="changeEmail">Cambiar correo</button>

        <p id="codeError" class="error" hidden></p>
      </form>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
