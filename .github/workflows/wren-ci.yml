name: Wren CI/CD Cloud Compilation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Compile and Validate Backend
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: wren-backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd wren-backend
          npm install

      - name: Compile Backend
        run: |
          cd wren-backend
          npm run build

  # 2. Compile Android APK in the Cloud (0% Local Overhead)
  android-cloud-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Sets up Gradle environment dynamically in the cloud without needing local wrappers
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Compile Android App in Cloud
        run: |
          cd wren-android
          gradle assembleDebug

      - name: Upload Generated APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wren-IDE-Debug-APK
          path: wren-android/app/build/outputs/apk/debug/app-debug.apk
