name: Wren CI/CD Reproducible Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Secure Server CI
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: wren-backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd wren-backend
          npm install

      - name: Compile Backend
        run: |
          cd wren-backend
          npm run build

